version: 2

project_name: dotfiles-bootstrap

builds:
  - id: dotfiles-bootstrap
    main: ./cmd/dotfiles-bootstrap
    binary: dotfiles-bootstrap
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: dotfiles-bootstrap
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
